name: bibliotheque_app
description: "Application Mobile de Bibliothèque de Quartier - DEVMOB-ApcPedagogie-16"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # UI & UX
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Scan QR / Barcode
  mobile_scanner: ^5.2.3

  # Image picker
  image_picker: ^1.1.2

  # Notifications locales
  flutter_local_notifications: ^17.2.3

  # Table calendar
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

# Commentaire ajouté: version stable testée avec Firebase 3.8.0
